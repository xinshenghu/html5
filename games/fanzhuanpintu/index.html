<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>翻转拼图 - 火影忍者</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; font-family: sans-serif;
  touch-action: none; -webkit-user-select: none; user-select: none;
  color: #fff; padding: 10px;
}
h1 { color: #e94560; font-size: clamp(1.2em, 5vw, 1.8em); }
.info { color: #aaa; font-size: 1em; margin: 5px 0 10px; }
.board {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px;
  width: min(85vw, 360px); background: #555; border-radius: 8px; overflow: hidden;
}
.cell {
  aspect-ratio: 167 / 172; cursor: pointer;
  background-size: cover; background-position: center;
}
.cell.selected { outline: 2px solid #e94560; outline-offset: -2px; }
.preview {
  width: min(85vw, 360px); margin-top: 12px; border-radius: 8px;
  border: 2px solid #e94560; aspect-ratio: 501 / 516;
}
.preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.btns { margin-top: 12px; display: flex; gap: 10px; justify-content: center; }
button { padding: 10px 20px; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; color: #fff; }
.btn-shuffle { background: #e94560; }
.btn-back { background: #555; }
.win-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 100;
  justify-content: center; align-items: center;
}
.win-overlay.show { display: flex; }
.win-box {
  background: #1a1a2e; padding: 30px; border-radius: 12px;
  text-align: center; border: 2px solid #e94560;
}
.win-box h2 { color: #e94560; margin-bottom: 10px; }
</style>
</head>
<body>

<h1>🔥 翻转拼图</h1>
<div class="info">步数：<span id="moves">0</span></div>
<div class="board" id="board"></div>
<div class="preview"><img src="images/full.png" alt="参考图"></div>
<div class="btns">
  <button class="btn-shuffle" onclick="doShuffle()">🔀 打乱</button>
  <button class="btn-back" onclick="goBack()">← 返回</button>
</div>
<div class="win-overlay" id="win">
  <div class="win-box">
    <h2>🎉 拼图完成！</h2>
    <p>用了 <span id="winMoves"></span> 步</p><br>
    <button class="btn-shuffle" onclick="doShuffle()">再来一局</button>
    <button class="btn-back" onclick="goBack()">返回</button>
  </div>
</div>

<script>
const R = 3, C = 3;
let board, moves, won, selR = -1, selC = -1;

function init() {
  board = []; won = false; moves = 0;
  for (let r = 0; r < R; r++) { board[r] = []; for (let c = 0; c < C; c++) board[r][c] = r * C + c; }
}

function doShuffle() {
  init();
  let flat = [...Array(9).keys()];
  do {
    for (let i = flat.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [flat[i], flat[j]] = [flat[j], flat[i]];
    }
  } while (flat.every((v, i) => v === i));
  for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) board[r][c] = flat[r * C + c];
  selR = selC = -1;
  document.getElementById('moves').textContent = '0';
  document.getElementById('win').classList.remove('show');
  render();
}

function checkWin() { return board.every((row, r) => row.every((v, c) => v === r * C + c)); }

function render() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < R; r++) {
    for (let c = 0; c < C; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (r === selR && c === selC) cell.classList.add('selected');
      const idx = board[r][c];
      cell.style.backgroundImage = `url(images/${idx + 1}.png)`;
      cell.addEventListener('click', () => onClick(r, c));
      el.appendChild(cell);
    }
  }
}

function onClick(r, c) {
  if (won) return;
  if (selR === -1) { selR = r; selC = c; }
  else {
    if (selR !== r || selC !== c) {
      [board[selR][selC], board[r][c]] = [board[r][c], board[selR][selC]];
      moves++;
      document.getElementById('moves').textContent = moves;
      if (checkWin()) {
        won = true;
        document.getElementById('winMoves').textContent = moves;
        document.getElementById('win').classList.add('show');
      }
    }
    selR = selC = -1;
  }
  render();
}

function goBack() { history.back(); }

init(); doShuffle();
</script>
</body>
</html>
