<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫雷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#fff;touch-action:none}
h1{color:#ff9800;margin:10px}
.info{margin-bottom:10px;font-size:1.1em}
.grid{display:grid;grid-template-columns:repeat(9,36px);gap:2px}
.cell{width:36px;height:36px;background:#3a3a5c;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:bold;cursor:pointer;font-size:16px}
.cell.revealed{background:#2a2a4c}
.cell.mine{background:#e94560}
.cell.flag{background:#ff9800}
.btns{margin-top:15px;display:flex;gap:10px}
button{padding:10px 20px;border:none;border-radius:6px;font-size:1em;cursor:pointer;color:#fff}
.btn-restart{background:#ff9800}
.btn-back{background:#555}
</style>
</head>
<body>
<h1>💣 扫雷</h1>
<div class="info">🚩 <span id="flags">0</span> / <span id="mines">10</span></div>
<div class="grid" id="grid"></div>
<div class="btns">
  <button class="btn-restart" onclick="init()">重新开始</button>
  <button class="btn-back" onclick="history.back()">← 返回</button>
</div>
<script>
const R=9,C=9,M=10;
let board,revealed,flagged,gameOver;
function init(){
  board=Array(R).fill().map(()=>Array(C).fill(0));revealed=Array(R).fill().map(()=>Array(C).fill(false));flagged=Array(R).fill().map(()=>Array(C).fill(false));gameOver=false;
  let placed=0;while(placed<M){let r=Math.floor(Math.random()*R),c=Math.floor(Math.random()*C);if(board[r][c]!==-1){board[r][c]=-1;placed++}}
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(board[r][c]===-1)continue;let cnt=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=c+dc;if(nr>=0&&nr<R&&nc>=0&&nc<C&&board[nr][nc]===-1)cnt++}board[r][c]=cnt}
  document.getElementById('mines').textContent=M;document.getElementById('flags').textContent='0';render()
}
function reveal(r,c){
  if(gameOver||revealed[r][c]||flagged[r][c])return;
  revealed[r][c]=true;
  if(board[r][c]===-1){gameOver=true;alert('💥 踩雷了！');render();return}
  if(board[r][c]===0){for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){let nr=r+dr,nc=c+dc;if(nr>=0&&nr<R&&nc>=0&&nc<C)reveal(nr,nc)}}
  if(revealed.flat().filter(v=>!v).length===M){gameOver=true;alert('🎉 你赢了！')}
  render()
}
function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  const colors=['','#4caf50','#2196f3','#e94560','#9c27b0','#ff9800','#00bcd4','#333','#666'];
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){
    const cell=document.createElement('div');cell.className='cell';
    if(revealed[r][c]){cell.classList.add('revealed');if(board[r][c]===-1)cell.classList.add('mine'),cell.textContent='💣';else if(board[r][c]>0)cell.textContent=board[r][c],cell.style.color=colors[board[r][c]]}
    else if(flagged[r][c])cell.classList.add('flag'),cell.textContent='🚩';
    cell.addEventListener('click',()=>reveal(r,c));
    cell.addEventListener('contextmenu',e=>{e.preventDefault();if(!revealed[r][c]){flagged[r][c]=!flagged[r][c];document.getElementById('flags').textContent=flagged.flat().filter(Boolean).length;render()}});
    g.appendChild(cell)
  }
}
init();
</script>
</body>
</html>
