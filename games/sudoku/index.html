<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数独</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#fff;touch-action:none;padding:10px}
h1{color:#2196f3;margin:10px}
.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;width:min(90vw,360px);background:#555;border:2px solid #2196f3;border-radius:4px}
.cell{aspect-ratio:1;background:#2a2a4c;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,22px);cursor:pointer;color:#fff}
.cell.given{color:#2196f3;font-weight:bold}
.cell.selected{background:#3a3a6c;outline:2px solid #e94560;outline-offset:-2px}
.cell.error{color:#e94560}
.nums{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;width:min(90vw,360px);margin-top:10px}
.num{padding:10px;background:#3a3a5c;border-radius:6px;text-align:center;cursor:pointer;font-size:1.1em}
.num:hover{background:#4a4a7c}
.btns{margin-top:10px;display:flex;gap:10px}
button{padding:10px 20px;border:none;border-radius:6px;font-size:1em;cursor:pointer;color:#fff}
.btn-restart{background:#2196f3}
.btn-back{background:#555}
</style>
</head>
<body>
<h1>🔢 数独</h1>
<div class="grid" id="grid"></div>
<div class="nums" id="nums"></div>
<div class="btns">
  <button class="btn-restart" onclick="newGame()">新游戏</button>
  <button class="btn-back" onclick="history.back()">← 返回</button>
</div>
<script>
let board,solution,selR=-1,selC=-1;
const puzzles=[
  '53..7....6..195...98....6.8...6...34..8.3..17...2...6.6....28...419..5....8..79',
  '..32..6..15...8..37..6.4..1....872..8..1..3..375....9..3.7..62..4...15..6..89..',
  '8..7..5..4...6..1..9.2.3...2...5.9..5...1..7.1...4...3.4.8..9..3...7..6..1..2'
];
function newGame(){
  const s=puzzles[Math.floor(Math.random()*puzzles.length)];
  board=s.split('').map(c=>c==='.'?0:parseInt(c));
  selR=selC=-1;render()
}
function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const cell=document.createElement('div');cell.className='cell';
    if(puzzles[0][r*9+c]!=='.')cell.classList.add('given');
    if(r===selR&&c===selC)cell.classList.add('selected');
    if(board[r*9+c])cell.textContent=board[r*9+c];
    const ri=r,ci=c;cell.addEventListener('click',()=>{selR=ri;selC=ci;render()});
    g.appendChild(cell)
  }
  const nums=document.getElementById('nums');nums.innerHTML='';
  for(let i=1;i<=9;i++){const n=document.createElement('div');n.className='num';n.textContent=i;n.addEventListener('click',()=>setNum(i));nums.appendChild(n)}
}
function setNum(n){
  if(selR>=0&&selC>=0&&puzzles[0][selR*9+selC]==='.'){board[selR*9+selC]=n;render();if(board.every((v,i)=>v!==0))checkWin()}
}
function checkWin(){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){let v=board[r*9+c];for(let i=0;i<9;i++)if((i!==c&&board[r*9+i]===v)||(i!==r&&board[i*9+c]===v))return}
  alert('🎉 数独完成！')
}
newGame();
</script>
</body>
</html>
