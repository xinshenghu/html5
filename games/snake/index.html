<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#fff;touch-action:none}
h1{color:#4caf50;margin:10px}
.score{font-size:1.2em;margin:5px 0 15px}
canvas{border:2px solid #4caf50;border-radius:8px;background:#0a0a1a}
.btns{margin-top:15px;display:flex;gap:10px}
button{padding:10px 20px;border:none;border-radius:6px;font-size:1em;cursor:pointer;color:#fff}
.btn-restart{background:#4caf50}
.btn-back{background:#555}
</style>
</head>
<body>
<h1>🐍 贪吃蛇</h1>
<div class="score">得分: <span id="score">0</span></div>
<canvas id="c"></canvas>
<div class="btns">
  <button class="btn-restart" onclick="restart()">重新开始</button>
  <button class="btn-back" onclick="history.back()">← 返回</button>
</div>
<script>
const SIZE=20,COLS=18,ROWS=22;
const c=document.getElementById('c');
const W=COLS*SIZE,H=ROWS*SIZE;
c.width=W;c.height=H;
const ctx=c.getContext('2d');
let snake,dir,food,score,interval,tick=120;

function init(){snake=[{x:9,y:11},{x:8,y:11},{x:7,y:11}];dir={x:1,y:0};food=randFood();score=0;document.getElementById('score').textContent='0'}
function randFood(){let f;do{f={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}while(snake.some(s=>s.x===f.x&&s.y===f.y));return f}
function step(){
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){clearInterval(interval);alert('游戏结束！得分:'+score);return}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById('score').textContent=score;food=randFood()}else{snake.pop()}
  draw()
}
function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e94560';ctx.fillRect(food.x*SIZE+1,food.y*SIZE+1,SIZE-2,SIZE-2);
  snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#4caf50':'#66bb6a';ctx.fillRect(s.x*SIZE+1,s.y*SIZE+1,SIZE-2,SIZE-2)})
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'&&dir.y!==1)dir={x:0,y:-1};if(e.key==='ArrowDown'&&dir.y!==-1)dir={x:0,y:1};if(e.key==='ArrowLeft'&&dir.x!==1)dir={x:-1,y:0};if(e.key==='ArrowRight'&&dir.x!==-1)dir={x:1,y:0}});
let sx=0,sy=0;
c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY});
c.addEventListener('touchend',e=>{let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)){if(dx>10&&dir.x!==-1)dir={x:1,y:0};else if(dx<-10&&dir.x!==1)dir={x:-1,y:0}}else{if(dy>10&&dir.y!==-1)dir={x:0,y:1};else if(dy<-10&&dir.y!==1)dir={x:0,y:-1}}});
function restart(){clearInterval(interval);init();interval=setInterval(step,tick)}
init();interval=setInterval(step,tick);
</script>
</body>
</html>
