<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>html5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background-color: #333; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background-color: #f5f5f5; border-right: 1px solid #ddd; overflow-y: auto; padding: 15px; }
        .tree ul { list-style: none; padding-left: 15px; }
        .tree li { margin: 5px 0; }
        .tree .folder { cursor: pointer; font-weight: bold; color: #333; display: flex; align-items: center; }
        .tree .folder::before { content: '▶'; margin-right: 5px; font-size: 10px; transition: transform 0.2s; }
        .tree .folder.open::before { transform: rotate(90deg); }
        .tree .file { color: #0066cc; cursor: pointer; padding-left: 10px; }
        .tree .file:hover { text-decoration: underline; }
        .tree .file::before { content: '○'; margin-right: 5px; font-size: 8px; }
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: #fff; }
        .content-header { padding: 15px; background-color: #fafafa; border-bottom: 1px solid #ddd; font-size: 16px; font-weight: bold; }
        iframe { flex: 1; width: 100%; border: none; background-color: #fff; }
    </style>
</head>
<body>
    <header>html5</header>
    <div class="container">
        <div class="sidebar">
            <div class="tree">
                <ul>
                    <li>
                        <div class="folder" onclick="toggleFolder(this)">工具类</div>
                        <ul>
                            <li><div class="file" onclick="openLink('luping.html', '录屏')">录屏</div></li>
                            <li><div class="file" onclick="openLink('tianqi/index.html', '天气')">天气</div></li>
                        </ul>
                    </li>
                    <li>
                        <div class="folder" onclick="toggleFolder(this)">游戏类</div>
                        <ul>
                            <li><div class="file" onclick="openLink('fanzhuanpintu/index.html', 'jQuery翻转拼图')">jQuery翻转拼图</div></li>
                        </ul>
                    </li>
                    <li>
                        <div class="folder" onclick="toggleFolder(this)">个人展示</div>
                        <ul>
                            <li><div class="file" onclick="openLink('person/index.html', '个人信息')">个人信息</div></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
        <div class="main-content">
            <div class="content-header" id="content-title">选择一个项目开始浏览</div>
            <iframe id="content-frame" src="" frameborder="0"></iframe>
        </div>
    </div>
    <script>
        function toggleFolder(element) {
            element.classList.toggle('open');
            const nextUl = element.nextElementSibling;
            if (nextUl) nextUl.style.display = nextUl.style.display === 'none' ? 'block' : 'none';
        }
        function openLink(url, title) {
            document.getElementById('content-title').textContent = title;
            document.getElementById('content-frame').src = url;
        }
        document.querySelectorAll('.folder').forEach(folder => {
            const nextUl = folder.nextElementSibling;
            if (nextUl) nextUl.style.display = 'none';
        });
    </script>
</body>
</html>
